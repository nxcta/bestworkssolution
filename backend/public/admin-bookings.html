<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BWS — Bookings admin</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 24px; background: #0f0a14; color: #eee; max-width: 1200px; }
    h1 { font-size: 1.25rem; }
    .hint { font-size: 0.82rem; color: #b8a0b0; line-height: 1.5; margin: 10px 0 16px; }
    input[type="password"], input[type="text"] { width: min(420px, 100%); padding: 10px; border-radius: 8px; border: 1px solid #333; background: #1a1220; color: #fff; }
    button { margin-top: 10px; margin-right: 8px; padding: 10px 16px; border-radius: 8px; border: 0; background: #c2185b; color: #fff; cursor: pointer; }
    button.secondary { background: #3d2a45; border: 1px solid #5a4058; }
    a { color: #f48fb1; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; font-size: 0.82rem; }
    th, td { border: 1px solid #333; padding: 8px; text-align: left; vertical-align: top; }
    th { background: #1a1220; }
    .err { color: #f88; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>Best Work Solution — bookings</h1>
  <p class="hint">
    Use your <strong>admin token</strong> in the field below (sent only in the <code>Authorization</code> header, never in the URL).
    If the server has HTTP Basic enabled, your browser will ask for that username and password first.
    Do not bookmark pages that contain the token in the address bar.
  </p>
  <label for="tok">Admin bearer token</label><br />
  <input id="tok" type="password" autocomplete="off" placeholder="Paste ADMIN_TOKEN" />
  <div>
    <button type="button" id="load">Load bookings</button>
    <button type="button" class="secondary" id="csvBtn" style="display:none">Download CSV</button>
  </div>
  <div id="err" class="err"></div>
  <div id="out"></div>
  <script src="/admin/admin-bookings.js" defer></script>
</body>
</html>
