<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BWS — Bookings admin</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 24px; background: #0f0a14; color: #eee; max-width: 1200px; }
    h1 { font-size: 1.25rem; }
    .hint { font-size: 0.82rem; color: #b8a0b0; line-height: 1.5; margin: 10px 0 16px; }
    input[type="password"], input[type="text"] { width: min(420px, 100%); padding: 10px; border-radius: 8px; border: 1px solid #333; background: #1a1220; color: #fff; }
    button { margin-top: 10px; margin-right: 8px; padding: 10px 16px; border-radius: 8px; border: 0; background: #c2185b; color: #fff; cursor: pointer; }
    button.secondary { background: #3d2a45; border: 1px solid #5a4058; }
    a { color: #f48fb1; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; font-size: 0.82rem; }
    th, td { border: 1px solid #333; padding: 8px; text-align: left; vertical-align: top; }
    th { background: #1a1220; }
    .err { color: #f88; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>Best Work Solution — bookings</h1>
  <p class="hint">
    Use your <strong>admin token</strong> in the field below (sent only in the <code>Authorization</code> header, never in the URL).
    If the server has HTTP Basic enabled, your browser will ask for that username and password first.
    Do not bookmark pages that contain the token in the address bar.
  </p>
  <label for="tok">Admin bearer token</label><br />
  <input id="tok" type="password" autocomplete="off" placeholder="Paste ADMIN_TOKEN" />
  <div>
    <button type="button" id="load">Load bookings</button>
    <button type="button" class="secondary" id="csvBtn" style="display:none">Download CSV</button>
  </div>
  <div id="err" class="err"></div>
  <div id="out"></div>
  <script>
    (function () {
      function authHeaders(token) {
        return {
          Authorization: "Bearer " + token,
          Accept: "application/json",
        };
      }

      function escapeCell(v) {
        if (v == null) return "";
        return String(v)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      document.getElementById("load").addEventListener("click", async function () {
        const token = document.getElementById("tok").value.trim();
        const err = document.getElementById("err");
        const out = document.getElementById("out");
        const csvBtn = document.getElementById("csvBtn");
        err.textContent = "";
        out.innerHTML = "";
        csvBtn.style.display = "none";
        csvBtn.onclick = null;

        if (!token) {
          err.textContent = "Enter your admin token.";
          return;
        }
        try {
          const r = await fetch("/api/bookings/admin", {
            method: "GET",
            credentials: "same-origin",
            headers: authHeaders(token),
          });
          const j = await r.json().catch(function () {
            return {};
          });
          if (!r.ok) {
            err.textContent = j.error || r.statusText || "Request failed";
            return;
          }

          csvBtn.style.display = "inline-block";
          csvBtn.onclick = async function () {
            err.textContent = "";
            try {
              const r2 = await fetch("/api/bookings/export.csv", {
                method: "GET",
                credentials: "same-origin",
                headers: {
                  Authorization: "Bearer " + token,
                  Accept: "text/csv",
                },
              });
              if (!r2.ok) {
                const t = await r2.text();
                err.textContent = t || r2.statusText;
                return;
              }
              const blob = await r2.blob();
              const url = URL.createObjectURL(blob);
              const a = document.createElement("a");
              a.href = url;
              a.download = "bws-bookings.csv";
              document.body.appendChild(a);
              a.click();
              document.body.removeChild(a);
              URL.revokeObjectURL(url);
            } catch (e2) {
              err.textContent = String(e2.message);
            }
          };

          const rows = j.bookings || [];
          if (!rows.length) {
            out.textContent = "No bookings yet.";
            return;
          }
          const cols = [
            "ref",
            "createdAt",
            "status",
            "service",
            "scheduledDate",
            "scheduledTime",
            "scheduledAtUtc",
            "email",
            "firstName",
            "lastName",
            "goal",
            "urgency",
          ];
          let html = "<table><tr>";
          for (let i = 0; i < cols.length; i++) html += "<th>" + escapeCell(cols[i]) + "</th>";
          html += "</tr>";
          for (let ri = 0; ri < rows.length; ri++) {
            const b = rows[ri];
            html += "<tr>";
            for (let c = 0; c < cols.length; c++) {
              html += "<td>" + escapeCell(b[cols[c]]) + "</td>";
            }
            html += "</tr>";
          }
          html += "</table>";
          out.innerHTML = html;
        } catch (e) {
          err.textContent = String(e.message);
        }
      });
    })();
  </script>
</body>
</html>
